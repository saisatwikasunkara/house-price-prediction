<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:500px;
            max-width:100%;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#4facfe;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2f8cff;
        }

        .result{
            margin-top:20px;
            padding:15px;
            background:#f1f7ff;
            border-radius:10px;
            text-align:center;
            font-size:18px;
            font-weight:bold;
            color:#222;
            white-space: pre-line;
        }

        .range{
            font-size:12px;
            color:gray;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🏠 House Price Prediction</h1>

    <form action="/predict" method="POST">

        <div class="input-group">
            <label>Living Area</label>
            <input type="number" name="living_area" min="370" max="13540" required>
            <div class="range">Range: 370 - 13540</div>
        </div>

        <div class="input-group">
            <label>Bedrooms</label>
            <input type="number" name="bedrooms" min="1" max="33" required>
            <div class="range">Range: 1 - 33</div>
        </div>

        <div class="input-group">
            <label>Bathrooms</label>
            <input type="number" step="0.5" name="bathrooms" min="0.5" max="8" required>
            <div class="range">Range: 1 - 8</div>
        </div>

        <div class="input-group">
            <label>Floors</label>
            <input type="number" step="0.5" name="floors" min="1" max="3.5" required>
            <div class="range">Range: 1 - 3</div>
        </div>

        <div class="input-group">
            <label>Condition of House</label>
            <input type="number" name="condition" min="1" max="5" required>
            <div class="range">Range: 1 - 5</div>
        </div>

        <div class="input-group">
            <label>Distance From Airport</label>
            <input type="number" step="0.1" name="airport" min="50" max="80" required>
            <div class="range">Range: 50 - 80</div>
        </div>

        <button type="submit">Predict Price</button>

    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

</div>

</body>
</html>
